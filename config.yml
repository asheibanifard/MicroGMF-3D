# ============================================================
#  Gaussian Mixture Field — Configuration
# ============================================================
# Tuned for microscopy neuron volumes (~100×647×813)
# ============================================================
seed: 42
data:
  tif_path: "data/raw/10-2900-control-cell-05_cropped_corrected.tif"
  swc_path: "data/raw/10-2900-control-cell-05_cropped_corrected.swc"
model:
  num_gaussians: 10000
  init_scale: 0.09
  init_amplitude: 0.05
  bounds: [[-1,1],[-1,1],[-1,1]]
training:
  device: auto
  log_dir: logs
  save_path: "checkpoints/gmf_refined.pt"
  resume_from: null
  mixed_precision: true

  # ---- Strategy ----
  mode: volume                  # volume only (faster; skip MIP)
  steps: 100000
  learning_rate: 3.0e-3
  lr_min_fraction: 0.01         # cosine decays to 3e-5 by step 100k

  # ---- Early stopping ----
  early_stopping: true
  early_stopping_patience: 5   # 30 × 500 = 15k steps — accommodates densify recovery
  early_stopping_min_delta: 0.001  # ≈ 1e-6 MSE delta in dB — matches baseline ES_MIN_DELTA
  log_every: 50
  psnr_eval_every: 500
  checkpoint_interval: 2000

  # ---- Volume sampling ----
  vol_points_per_step: 16384
  vol_intensity_weighted: true

  # ---- Gradient supervision ----
  use_grad_loss: false
  lambda_grad: 0.3
  grad_delta_vox: 1

  # ---- MIP settings (only used if mode=hybrid) ----
  mip_pixels_per_step: 512
  mip_z_samples: 32
  tau_start: 0.08
  tau_end: 0.02

  # ---- Regulariser weights ----
  lambda_tube: 1.0e-4
  lambda_cross: 1.0e-4
  lambda_scale: 1.0e-3          # bumped from 5e-4 — discourages large diffuse Gaussians
  scale_target: 0.05

  # ---- Weight schedule ----
  weight_schedule: linear_ramp
  w_vol_start: 1.0
  w_mip_start: 0.1
  w_vol_end: 1.0
  w_mip_end: 0.8
  weight_transition_fraction: 0.3  # MIP ramps in over first 9k steps

  # ---- Scale clamping ----
  clamp_scales: true
  log_scale_min: -7.6           # exp(-7.6) ≈ 0.0005
  log_scale_max: -1.2           # exp(-1.2) ≈ 0.30

  # ---- Amplitude clamping ----
  clamp_amplitudes: true
  log_amp_min: -9.2
  log_amp_max: 0.0

  # ---- Gradient clipping ----
  grad_clip_norm: 1.0

  # ---- Densification & pruning ----
  densify_enabled: true
  densify_from_iter: 500
  densify_until_iter: 20000     # 10k steps of pure fine-tuning after this
  densify_interval: 200
  densify_grad_threshold: 3.0e-4
  max_gaussians: 60000
  densify_min_amplitude: 0.0
  densify_max_scale: 0.8
  densify_split_scale_threshold: 0.02
  densify_enforce_aabb: true
  densify_max_clones_per_step: 200
  densify_lr_factor: 0.2
  densify_lr_warmup_steps: 25
  densify_cooldown_evals: 5     # 5 × 500 = 2.5k step cooldown after each densify

  # ---- AABB hard constraint ----
  enforce_aabb_hard: false

  # ---- Progressive mode ----
  progressive_split_frac: 0.3