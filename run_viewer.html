<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MIP Splatting via gsplat.js</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #1a1a2e; }
        canvas { width: 100%; height: 100%; }
        #progress { position: absolute; top: 50%; left: 50%; color: white; transform: translate(-50%, -50%); font-family: sans-serif; font-size: 24px;}
        #title { position: absolute; top: 20px; left: 20px; color: #7fffb0; font-family: sans-serif; font-size: 18px; text-shadow: 1px 1px 2px black;}
    </style>
</head>
<body>
    <div id="progress">Loading points...</div>
    <div id="title">MicroGMF MIP Splatter (gsplat.js)</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        import * as SPLAT from "./gsplat.js/dist/index.es.js";
        
        const canvas = document.getElementById("canvas");
        const progressEl = document.getElementById("progress");
        
        const renderer = new SPLAT.WebGLRenderer(canvas);
        const scene = new SPLAT.Scene();
        const camera = new SPLAT.Camera();
        const center = new SPLAT.Vector3(400, 320, 50);
        const controls = new SPLAT.OrbitControls(camera, canvas, 0.5, 0.5, 1500, true, center);
        
        async function main() {
            try {
                // The viewer directory already contains scene.ply which is gmf_refined_best.ply
                const url = "./viewer/scene.ply"; 
                await SPLAT.PLYLoader.LoadAsync(url, scene, (progress) => {
                    progressEl.innerText = `Loading... ${(progress * 100).toFixed(1)}%`;
                }, "");
                progressEl.style.display = "none";
                
                const handleResize = () => {
                    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
                };
                
                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                
                handleResize();
                window.addEventListener("resize", handleResize);
                requestAnimationFrame(frame);
            } catch (err) {
                progressEl.innerText = "Error: " + err.message;
                console.error(err);
            }
        }
        main();
    </script>
</body>
</html>
